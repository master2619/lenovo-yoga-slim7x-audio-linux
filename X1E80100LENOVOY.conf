Syntax 4

Comment "Lenovo Yoga Slim 7x Audio"

ValueDefaults {
    cdev "hw:X1E80100LENOVOY"
}

SectionUseCase."HiFi" {
    File "/Qualcomm/x1e80100/HiFi.conf"
    Comment "Default HiFi Profile"
}

BootSequence [
	cset "name='TweeterLeft PA Volume' 0"
	cset "name='TweeterRight PA Volume' 0"
	cset "name='WooferLeft PA Volume' 0"
	cset "name='WooferRight PA Volume' 0"
]

Include.card-init.File "/lib/card-init.conf"
Include.ctl-remap.File "/lib/ctl-remap.conf"
Include.wsa-init.File "/codecs/wsa884x/four-speakers/init.conf"
Include.wsam-init.File "/codecs/qcom-lpass/wsa-macro/four-speakers/init.conf"
